name: Validar antes de desplegar

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  validar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validar sintaxis JS/HTML/JSON
        run: node scripts/validate.js
